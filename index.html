<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vic-Tech Subnet Calculator</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="calculator-container">
        <header>
            <h1>Vic-Tech Subnet Calculator</h1>
            <p>Compute network parameters efficiently</p>
        </header>

        <main>
            <form id="subnet-form" class="input-section">
                <div class="input-group">
                    <label for="ip-input">IP Address</label>
                    <input type="text" id="ip-input" placeholder="e.g. 192.168.1.1" required>
                    <span class="error-msg" id="ip-error"></span>
                </div>
                <div class="input-group">
                    <label for="mask-input">Subnet Mask or CIDR</label>
                    <input type="text" id="mask-input" placeholder="e.g. 255.255.255.0 or /24" required>
                    <span class="error-msg" id="mask-error"></span>
                </div>
            </form>

            <div class="results-section">
                <div class="result-card">
                    <div class="result-label">Network Address</div>
                    <div class="result-value" id="net-address">-</div>
                </div>
                <div class="result-card">
                    <div class="result-label">Broadcast Address</div>
                    <div class="result-value" id="broadcast-address">-</div>
                </div>
                <div class="result-card">
                    <div class="result-label">First Usable Host</div>
                    <div class="result-value" id="first-host">-</div>
                </div>
                <div class="result-card">
                    <div class="result-label">Last Usable Host</div>
                    <div class="result-value" id="last-host">-</div>
                </div>
                <div class="result-card">
                    <div class="result-label">Total Hosts</div>
                    <div class="result-value" id="total-hosts">-</div>
                </div>
                <div class="result-card">
                    <div class="result-label">Usable Hosts</div>
                    <div class="result-value" id="usable-hosts">-</div>
                </div>
                <div class="result-card">
                    <div class="result-label">Subnet Mask</div>
                    <div class="result-value" id="subnet-mask">-</div>
                </div>
                <div class="result-card">
                    <div class="result-label">CIDR Notation</div>
                    <div class="result-value" id="cidr-notation">-</div>
                </div>
                <div class="result-card">
                    <div class="result-label">IP Class</div>
                    <div class="result-value" id="ip-class">-</div>
                </div>
            </div>
        </main>
        <!-- Footer -->
        <footer style="text-align:center; padding:15px; margin-top:20px; font-size:14px; color:#555;">
            &copy; 2026 Vic Technologies. All rights reserved.
        </footer>
    </div>
    <script src="script.js"></script>
</body>

</html>
